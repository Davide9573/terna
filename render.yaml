# Render.com Blueprint — deploys the Terna Energy Simulator as a single free web service.
# Docs: https://render.com/docs/blueprint-spec
#
# What happens on each deploy:
#   1. Python deps are installed.
#   2. The React frontend is built to frontend/dist/.
#   3. power_2025.npz is regenerated from the CSV files in the repository.
#   4. FastAPI (uvicorn) starts and serves both the API and the built frontend.
#
# Free tier note: the service spins down after ~15 min of inactivity and takes
# ~30 s to cold-start on the next request — fine for a demo/educational app.

services:
  - type: web
    name: terna
    runtime: python
    plan: free
    buildCommand: >
      pip install -r requirements.txt &&
      cd frontend && npm ci && npm run build && cd .. &&
      python convert_csv_into_pnz.py
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
